name: Update market data

on:
  schedule:
    # Poll after the US market close. These are about 08:00, 10:00, 12:00,
    # and 15:00 in Japan on the next calendar day for US trading sessions.
    - cron: "0 23 * * 1-5"
    - cron: "0 1,3,6 * * 2-6"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-market-data
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-market-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read current data date
        id: before
        run: |
          DATE=$(node -e "const fs=require('fs'); const p='public/data/risk-dashboard-latest.json'; console.log(fs.existsSync(p) ? JSON.parse(fs.readFileSync(p,'utf8')).asOf || '' : '')")
          echo "asof=$DATE" >> "$GITHUB_OUTPUT"
          echo "Current data date: ${DATE:-none}"

      - name: Update JSON data
        run: npm run update:data

      - name: Read updated data date
        id: after
        run: |
          DATE=$(node -e "const fs=require('fs'); const p='public/data/risk-dashboard-latest.json'; console.log(fs.existsSync(p) ? JSON.parse(fs.readFileSync(p,'utf8')).asOf || '' : '')")
          echo "asof=$DATE" >> "$GITHUB_OUTPUT"
          echo "Updated data date: ${DATE:-none}"

      - name: Show changed data files
        run: git status --short public/data

      - name: Commit updated data when a newer trading day is available
        run: |
          BEFORE="${{ steps.before.outputs.asof }}"
          AFTER="${{ steps.after.outputs.asof }}"

          if [ -n "$BEFORE" ] && [ "$AFTER" = "$BEFORE" ]; then
            echo "No newer complete trading day yet. Keep existing data date: $BEFORE"
            exit 0
          fi

          if git diff --quiet -- public/data; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          git commit -m "chore: update market data ${AFTER:-unknown-date}"
          git push
